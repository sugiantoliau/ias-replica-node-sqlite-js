<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend API Server Status</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f7fafc;
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .status-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
        }
        .status-indicator {
            color: #38a169;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        code {
            background-color: #edf2f7;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: SFMono-Regular, Consolas, Monaco, monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="status-card">
        <div class="status-indicator">● API Server Running (Port 8081)</div>
        <h2>Headless Mode Active</h2>
        <p>To access the user interface dashboard, please open your local explorer tree:</p>
        <p>Go to folder <code>frontend/</code> and double click <code>index.html</code> to open the file in your browser</p>
    </div>

</body>
</html>
